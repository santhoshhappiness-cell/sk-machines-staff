
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SK Machines</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root{
  --red:#C0392B;--red2:#E8251A;--red-glow:rgba(192,57,43,0.15);--red-light:rgba(232,37,26,0.08);
  --bg:#F2F2F7;--bg2:#fff;--bg3:#F9F9FB;--border:rgba(0,0,0,0.08);
  --text:#1C1C1E;--text2:#3A3A3C;--text3:#636366;--text4:#AEAEB2;
  --green:#27AE60;--green-bg:rgba(39,174,96,0.10);
  --orange:#E67E22;--orange-bg:rgba(230,126,34,0.10);
  --blue:#2980B9;--blue-bg:rgba(41,128,185,0.10);
  --shadow:0 2px 16px rgba(0,0,0,0.07);
  --rm:14px;--rl:20px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
#root{min-height:100vh;}
/* Splash */
.splash{position:fixed;inset:0;background:linear-gradient(160deg,#1a0000,#6B0000,#C0392B);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.splash-logo{width:90px;height:90px;background:rgba(255,255,255,0.12);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:42px;margin-bottom:18px;border:1px solid rgba(255,255,255,0.2);}
.splash-title{color:#fff;font-size:26px;font-weight:700;}
.splash-sub{color:rgba(255,255,255,0.5);font-size:14px;margin-top:5px;}
.splash-welcome{color:#fff;font-size:22px;font-weight:900;text-align:center;line-height:1.35;max-width:720px;padding:0 24px;margin-top:22px;text-transform:uppercase;animation:blink 1.2s infinite;}
.splash-conf{color:rgba(255,150,150,0.8);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:12px;animation:blink 1.5s infinite;}
/* Login */
.login-wrap{position:fixed;inset:0;background:linear-gradient(160deg,#1a0000,#6B0000,#C0392B);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-brand{text-align:center;margin-bottom:28px;}
.login-logo{width:72px;height:72px;background:rgba(255,255,255,0.12);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:32px;border:1px solid rgba(255,255,255,0.18);}
.login-brand h1{color:#fff;font-size:24px;font-weight:700;}
.login-brand p{color:rgba(255,150,150,0.8);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:4px;animation:blink 1.5s infinite;}
.login-card{width:100%;max-width:360px;background:rgba(255,255,255,0.08);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.14);border-radius:22px;padding:26px 22px;}
.login-card h2{color:#fff;font-size:18px;font-weight:600;margin-bottom:4px;}
.login-card p{color:rgba(255,255,255,0.45);font-size:13px;margin-bottom:18px;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;color:#333;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
.google-btn:active{transform:scale(0.97);}
.login-msg{border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
.login-msg.error{background:rgba(255,59,48,0.20);color:#FF6B61;border:1px solid rgba(255,59,48,0.25);}
.login-msg.info{background:rgba(0,122,255,0.20);color:#64B5F6;border:1px solid rgba(0,122,255,0.25);}
/* Setup */
.setup-wrap{position:fixed;inset:0;background:var(--bg);overflow-y:auto;z-index:99;}
.setup-header{background:linear-gradient(135deg,var(--red),var(--red2));padding:calc(var(--safe-top) + 20px) 20px 24px;color:#fff;}
.setup-header h2{font-size:22px;font-weight:700;}
.setup-header p{font-size:13px;opacity:0.75;margin-top:4px;}
.setup-body{padding:18px;max-width:480px;margin:auto;padding-bottom:40px;}
.form-section{margin-bottom:22px;}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;padding:0 2px;}
.form-group{background:var(--bg2);border-radius:var(--rm);overflow:hidden;box-shadow:var(--shadow);}
.form-row{display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);min-height:50px;}
.form-row:last-child{border-bottom:none;}
.form-row .icon{font-size:14px;margin-right:10px;}
.form-row label{font-size:12px;color:var(--text3);width:100px;flex-shrink:0;}
.form-row input,.form-row select,.form-row textarea{flex:1;border:none;outline:none;background:none;font-size:14px;color:var(--text);padding:13px 0;text-align:right;font-family:inherit;}
.form-row select{-webkit-appearance:none;}
.form-row input::placeholder,.form-row textarea::placeholder{color:var(--text4);}
.form-row textarea{resize:none;text-align:left;padding:12px 0;}
/* Main App */
.main-wrap{min-height:100vh;padding-bottom:calc(68px + var(--safe-bot));}
.navbar{position:sticky;top:0;z-index:90;background:rgba(192,57,43,0.96);backdrop-filter:blur(20px);padding:calc(var(--safe-top) + 10px) 16px 12px;display:flex;align-items:center;justify-content:space-between;}
.navbar h1{color:#fff;font-size:16px;font-weight:700;}
.navbar-conf{color:rgba(255,180,180,0.85);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;animation:blink 1.5s infinite;margin-top:2px;}
.navbar-meta{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap;}
.header-time{color:rgba(255,255,255,0.82);font-size:12px;font-weight:600;}
.welcome-flash{background:rgba(255,255,255,0.18);color:#fff;border:1px solid rgba(255,255,255,0.22);border-radius:14px;padding:7px 12px;font-size:13px;font-weight:800;animation:blink 1.5s infinite;}
.remark-flash{margin-top:5px;display:inline-block;background:rgba(255,255,200,0.12);color:rgba(255,255,200,0.95);border:1px solid rgba(255,255,150,0.22);border-radius:12px;padding:4px 11px;font-size:11px;font-weight:600;max-width:min(300px,72vw);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;animation:rmk-pulse 3s ease-in-out infinite;}
@keyframes rmk-pulse{0%,100%{opacity:1;}50%{opacity:0.55;}}
.navbar-right{display:flex;align-items:center;gap:8px;}
.notif-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;}
.notif-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;background:#FFD60A;border-radius:50%;}
.logout-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.20);color:#fff;padding:6px 12px;border-radius:16px;font-size:12px;font-weight:500;cursor:pointer;}
/* Tabs */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:90;background:rgba(255,255,255,0.93);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(var(--safe-bot) + 2px);}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:5px 4px;cursor:pointer;border:none;background:none;}
.tab-item .t-icon{font-size:21px;}
.tab-item .t-label{font-size:10px;font-weight:500;color:var(--text4);margin-top:2px;}
.tab-item.active .t-label{color:var(--red);}
/* Page content */
.page{padding:14px;}
/* Cards */
.card{background:var(--bg2);border-radius:var(--rl);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;}
.card-header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:600;}
.card-body{padding:10px 16px 16px;}
.section-title{font-size:18px;font-weight:700;margin-bottom:12px;}
.stat-row{display:flex;gap:10px;margin-bottom:12px;}
.stat-box{flex:1;background:var(--bg2);border-radius:var(--rm);padding:12px;text-align:center;box-shadow:var(--shadow);}
.stat-box .sn{font-size:19px;font-weight:700;color:var(--red);}
.stat-box .sl{font-size:11px;color:var(--text4);margin-top:2px;}
/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:16px;font-size:11px;font-weight:600;}
.tag-green{background:var(--green-bg);color:var(--green);}
.tag-red{background:var(--red-light);color:var(--red);}
.tag-orange{background:var(--orange-bg);color:var(--orange);}
.tag-blue{background:var(--blue-bg);color:var(--blue);}
/* Lists */
.list{background:var(--bg2);border-radius:var(--rm);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;}
.list-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;}
.list-row:last-child{border-bottom:none;}
.list-icon{font-size:17px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.list-body{flex:1;}
.list-title{font-size:14px;font-weight:500;}
.list-sub{font-size:12px;color:var(--text4);margin-top:1px;}
/* Buttons */
.btn{display:block;width:100%;padding:13px;border:none;border-radius:var(--rm);font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.18s;font-family:inherit;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--red);color:#fff;box-shadow:0 3px 12px var(--red-glow);}
.btn-primary:disabled{opacity:0.45;}
.btn-ghost{background:var(--bg);color:var(--red);border:1.5px solid rgba(192,57,43,0.20);}
.btn-success{background:var(--green-bg);color:var(--green);border:1.5px solid rgba(39,174,96,0.25);}
.btn-danger{background:var(--red-light);color:var(--red);}
.btn-sm{padding:6px 12px;font-size:12px;width:auto;display:inline-block;border-radius:8px;}
/* Alert */
.alert{border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:10px;}
.alert-error{background:rgba(255,59,48,0.10);color:#C0392B;border:1px solid rgba(192,57,43,0.15);}
.alert-success{background:rgba(39,174,96,0.10);color:#27AE60;border:1px solid rgba(39,174,96,0.20);}
.alert-info{background:rgba(41,128,185,0.10);color:#2980B9;border:1px solid rgba(41,128,185,0.15);}
/* Empty state */
.empty{text-align:center;padding:36px 20px;color:var(--text4);}
.empty .ei{font-size:36px;margin-bottom:8px;opacity:0.4;}
/* Toast */
.toast{position:fixed;bottom:calc(76px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:rgba(28,28,30,0.88);backdrop-filter:blur(16px);color:#fff;padding:10px 18px;border-radius:18px;font-size:13px;font-weight:500;white-space:nowrap;z-index:999;opacity:0;transition:all 0.3s;max-width:90vw;text-align:center;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* Notif panel */
.notif-panel{position:fixed;top:0;right:-100%;width:min(320px,100vw);height:100vh;background:var(--bg2);z-index:150;transition:right 0.3s;box-shadow:-4px 0 30px rgba(0,0,0,0.12);overflow-y:auto;}
.notif-panel.open{right:0;}
.notif-head{background:var(--red);color:#fff;padding:calc(var(--safe-top) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;}
.notif-head h3{font-size:15px;font-weight:700;}
.notif-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);}
.notif-item .nm{font-size:13px;color:var(--text);line-height:1.5;}
.notif-item .nt{font-size:11px;color:var(--text4);margin-top:3px;}
.nov{position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:149;}
/* Attendance tiles */
.att-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.att-tile{background:var(--bg3);border-radius:var(--rm);padding:14px;text-align:center;cursor:pointer;border:1.5px solid var(--border);transition:all 0.2s;}
.att-tile:active:not(.locked):not(.done){transform:scale(0.95);}
.att-tile.locked{opacity:0.35;pointer-events:none;}
.att-tile.done{background:var(--green-bg);border-color:rgba(39,174,96,0.3);pointer-events:none;}
.att-tile.active-tile{background:var(--red-light);border-color:rgba(192,57,43,0.25);}
.att-tile .tile-icon{font-size:22px;margin-bottom:6px;}
.att-tile .tile-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;}
.att-tile .tile-time{font-size:18px;font-weight:700;color:var(--text);margin:4px 0;}
.att-tile.done .tile-time{color:var(--green);}
.att-tile .tile-hint{font-size:10px;color:var(--text4);}
/* Spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:5px;vertical-align:middle;}
/* Dept/filter chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;}
.chip{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg2);color:var(--text3);border:1.5px solid var(--border);white-space:nowrap;flex-shrink:0;}
.chip.active{background:var(--red);color:#fff;border-color:var(--red);}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border-radius:var(--rl);padding:22px;width:100%;max-width:340px;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px;}
.inp{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;background:var(--bg);}
.inp:focus{border-color:var(--red);}
textarea.inp{resize:none;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── GAS Bridge ───────────────────────────────────────────────
function gasCall(fn, args, cb, errCb) {
  if (!window.google || !google.script || !google.script.run) {
    const msg = 'Open the deployed Apps Script /exec URL. Local HTML file cannot read Google Sheets.';
    showToast(msg);
    if (errCb) errCb({ message: msg });
    return;
  }
  var callArgs = args || [];
  var userScopedFns = ['saveProfile','getMyProfile','savePhoto','getTodayAtt','markIn','markLunchStart','markLunchEnd','markOut','getMyAtt','applyLeave','getMyLeaves','applySalaryRequest','getMySalaryRequests','getMyNotifs','markNotifsRead','clearNewRating','applyAdvance','getMyAdvances'];
  if (userScopedFns.indexOf(fn) !== -1) {
    callArgs = [localStorage.getItem('skmEmail') || ''].concat(callArgs);
  }
  var call = google.script.run
    .withSuccessHandler(cb)
    .withFailureHandler(errCb || function(e){ console.error(e); });
  call[fn].apply(call, callArgs);
}

// ── React App ────────────────────────────────────────────────
const { useState, useEffect, useRef, useCallback } = React;

// ── Toast ────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('globalToast');
  if (!t) return;
  t.innerText = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// Button tap sound and lightweight app-wide sync events
let audioCtx;
function playTapSound() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(720, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.08, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.09);
  } catch(e) {}
}
function playNotificationSound() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    [0, 0.18, 0.36].forEach(function(offset, i) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime([880, 1040, 1320][i], audioCtx.currentTime + offset);
      gain.gain.setValueAtTime(0.001, audioCtx.currentTime + offset);
      gain.gain.exponentialRampToValueAtTime(0.22, audioCtx.currentTime + offset + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + offset + 0.16);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + offset);
      osc.stop(audioCtx.currentTime + offset + 0.18);
    });
  } catch(e) {}
}
document.addEventListener('click', function(e) {
  if (e.target.closest('button,.chip,.tab-item,.att-tile,[role="button"]')) playTapSound();
});


// ── Stars Helper ─────────────────────────────────────────────
function StarsDisplay({ count }) {
  return React.createElement('span', null,
    [1,2,3,4,5].map(i =>
      React.createElement('span', { key:i, style:{ fontSize:'16px', opacity: i <= count ? 1 : 0.2 } }, '⭐')
    )
  );
}

function HeaderClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const interval = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(interval);
  }, []);
  return React.createElement('span', { className:'header-time' },
    now.toLocaleString('en-IN', { weekday:'short', day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' })
  );
}

// ── Attendance Page ──────────────────────────────────────────
function AttPage({ user }) {
  const [att, setAtt] = useState(null);
  const [loading, setLoading] = useState(true);
  const [liveH, setLiveH] = useState('');
  const [warn, setWarn] = useState('');

  useEffect(() => {
    loadAtt();
    const interval = setInterval(() => {
      setAtt(prev => {
        if (prev && prev.found && prev.inTime && !prev.outTime) {
          const [h, m] = prev.inTime.split(':');
          const start = new Date();
          start.setHours(parseInt(h), parseInt(m), 0);
          const hrs = ((new Date() - start) / 3600000).toFixed(2);
          setLiveH(hrs);
        }
        return prev;
      });
    }, 30000);
    return () => clearInterval(interval);
  }, []);

  function loadAtt() {
    setLoading(true);
    gasCall('getTodayAtt', [], (a) => { setAtt(a); setLoading(false); if(a && a.found && a.inTime && !a.outTime){ const [h,m]=a.inTime.split(':');const s=new Date();s.setHours(parseInt(h),parseInt(m),0);setLiveH(((new Date()-s)/3600000).toFixed(2));} }, () => setLoading(false));
  }

  function doAction(fn) {
    gasCall(fn, [], (r) => {
      if (r.success) {
        showToast(fn==='markIn'?'✅ Checked in at '+r.inTime:fn==='markLunchStart'?'🍽 Lunch started':fn==='markLunchEnd'?'✅ Lunch ended':'👋 Checked out! ₹'+r.salary);
        if (r.warning) setWarn('⚠️ '+r.warningMsg);
        loadAtt();
      } else {
        showToast('⚠️ '+r.message);
        if (r.blocked) setWarn(r.message);
      }
    }, (e) => showToast('⚠️ '+e.message));
  }

  const today = new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const found = att && att.found;

  const tiles = [
    { id:'in',    icon:'🟢', label:'Check In',    time: found ? att.inTime : null,    hint:'Tap to check in',   fn:'markIn',         done: !!att?.inTime,    locked: false },
    { id:'ls',    icon:'🍽️', label:'Lunch Start', time: found ? att.lunchStart : null, hint:'After check in',   fn:'markLunchStart', done: !!att?.lunchStart, locked: !att?.inTime },
    { id:'le',    icon:'✅',  label:'Lunch End',   time: found ? att.lunchEnd : null,   hint:'After lunch start',fn:'markLunchEnd',   done: !!att?.lunchEnd,   locked: !att?.lunchStart },
    { id:'out',   icon:'🔴', label:'Check Out',   time: found ? att.outTime : null,    hint:'After check in',   fn:'markOut',        done: !!att?.outTime,    locked: !att?.inTime },
  ];

  return React.createElement('div', { className:'page' },
    React.createElement('div', { style:{ marginBottom:14 } },
      React.createElement('div', { className:'section-title' }, 'Today'),

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('splash');
  const [user, setUser] = useState(null);
  const [activeTab, setActiveTab] = useState('att');
  const [notifOpen, setNotifOpen] = useState(false);
  const [notifs, setNotifs] = useState([]);
  const [loginMsg, setLoginMsg] = useState(null);
  const [loginEmail, setLoginEmail] = useState(localStorage.getItem('skmEmail') || '');
  const unreadCountRef = useRef(0);
  const notifJsonRef = useRef('');
  const pauseNotifUntilRef = useRef(0);

  useEffect(() => {
    setTimeout(() => {
      gasCall('getCurrentUser', [localStorage.getItem('skmEmail') || ''], (u) => {
        if (u.success) {
          localStorage.setItem('skmEmail', u.email);
          setLoginEmail(u.email);
          setUser(u);
          if (!u.profileComplete) setScreen('setup');
          else { setScreen('app'); loadNotifs(u); }
        } else if (u.notApproved) {
          setLoginMsg({ type:'error', text:u.message });
          setScreen('login');
        } else {
          setScreen('login');
        }
      }, () => setScreen('login'));
    }, 2000);
  }, []);

  useEffect(() => {
    function pausePolling(){ pauseNotifUntilRef.current = Date.now() + 4000; }
    window.addEventListener('scroll', pausePolling, true);
    window.addEventListener('wheel', pausePolling, { passive:true });
    window.addEventListener('touchstart', pausePolling, { passive:true });
    window.addEventListener('touchmove', pausePolling, { passive:true });
    return () => {
      window.removeEventListener('scroll', pausePolling, true);
      window.removeEventListener('wheel', pausePolling);
      window.removeEventListener('touchstart', pausePolling);
      window.removeEventListener('touchmove', pausePolling);
    };
  }, []);

  useEffect(() => {
    if (screen !== 'app' || !user) return;
    const interval = setInterval(() => {
      if (Date.now() < pauseNotifUntilRef.current) return;
      loadNotifs(user);
    }, 15000);
    return () => clearInterval(interval);
  }, [screen, user]);

  function loadNotifs(u) {
    gasCall('getMyNotifs', [], (items) => {
      const list = items || [];
      const unreadCount = list.filter(n => n.read !== 'YES').length;
      if (unreadCount > unreadCountRef.current) playNotificationSound();
      unreadCountRef.current = unreadCount;
      const nextJson = JSON.stringify(list);
      if (nextJson !== notifJsonRef.current) {
        notifJsonRef.current = nextJson;
        setNotifs(list);
      }
      if ((u||user)?.newRating === 'YES') gasCall('clearNewRating', [], ()=>{}, ()=>{});
    }, ()=>{});
  }

  function doLogin() {
    setLoginMsg(null);
    var email = loginEmail.trim().toLowerCase();
    if (!email) {
      setLoginMsg({ type:'error', text:'Enter the approved email added by admin.' });
      return;
    }
    gasCall('getCurrentUser', [email], (u) => {
      if (u.success) {
        localStorage.setItem('skmEmail', u.email);
        setLoginEmail(u.email);
        setUser(u);
        if (!u.profileComplete) setScreen('setup');
        else { setScreen('app'); loadNotifs(u); }
      } else if (u.notApproved) {
        setLoginMsg({ type:'error', text:u.message });
      } else if (u.notSignedIn) {
        setLoginMsg({ type:'info', text:'Enter the approved email added by admin, then continue.' });
      } else {
        setLoginMsg({ type:'info', text:'Please open this app in Chrome while signed into your Google account ('+u.email+').' });
      }
    }, (e) => setLoginMsg({ type:'error', text:'Error: '+e.message }));
  }

  function doLogout() { localStorage.removeItem('skmEmail'); setLoginEmail(''); setUser(null); setScreen('login'); setNotifs([]); }

  function openNotifs() {
    setNotifOpen(true);
    if (notifs.some(n => n.read !== 'YES')) {
      gasCall('markNotifsRead', [], ()=>{ unreadCountRef.current=0; loadNotifs(user); }, ()=>{});
    }
  }

  const unreadCount = notifs.filter(n => n.read !== 'YES').length;
  const tabs = [
    { id:'att',    icon:'⏱', label:'Today'   },
    { id:'leave',  icon:'🏖', label:'Leave'   },
    { id:'req',    icon:'📝', label:'Request' },
    ...(user?.role !== 'admin' ? [{ id:'adv', icon:'💰', label:'Advance' }] : []),
    { id:'hist',   icon:'📅', label:'History' },
    { id:'prof',   icon:'👤', label:'Profile' },
    ...(user?.role==='admin' ? [{ id:'report', icon:'📊', label:'Report' }, { id:'admin', icon:'🔧', label:'Admin' }] : [])
  ];

  if (screen === 'splash') return React.createElement('div', { className:'splash' },
    React.createElement('div', { className:'splash-logo' }, '🏭'),
    React.createElement('div', { className:'splash-title' }, 'SK Machines'),
    React.createElement('div', { className:'splash-sub' }, 'Sarvashakthi Rotavator • Salem'),
    React.createElement('div', { className:'splash-welcome' }, 'Hello All Welcome To Sarvashakthi Rotavator By SK Machines'),
    React.createElement('div', { className:'splash-conf' }, 'CONFIDENTIAL')
  );

  if (screen === 'login') return React.createElement('div', { className:'login-wrap' },
    React.createElement('div', { className:'login-brand' },
      React.createElement('div', { className:'login-logo' }, '🏭'),
      React.createElement('h1', null, 'SK Machines'),
      React.createElement('p', null, 'CONFIDENTIAL STAFF APP')
    ),
    React.createElement('div', { className:'login-card' },
      React.createElement('h2', null, 'Staff Sign In'),
      React.createElement('p', null, 'Use the approved email added by admin.'),
      loginMsg && React.createElement('div', { className:'login-msg '+loginMsg.type }, loginMsg.text),
      React.createElement('input', {
        className:'inp',
        type:'email',
        placeholder:'santhoshhappiness@gmail.com',
        value:loginEmail,
        onChange:function(e){ setLoginEmail(e.target.value); },
        onKeyDown:function(e){ if(e.key === 'Enter') doLogin(); },
        style:{ marginBottom:14, background:'#fff' }
      }),
      React.createElement('button', { className:'google-btn', onClick:doLogin },
        React.createElement('span', null, 'G'),
        React.createElement('span', null, 'Continue')
      )
    )
  );

  if (screen === 'setup') return React.createElement(SetupScreen, {
    user:user,
    onDone:function(updatedUser){
      setUser(updatedUser);
      setScreen('app');
      loadNotifs(updatedUser);
    }
  });

  return React.createElement('div', { className:'main-wrap' },
    React.createElement('div', { className:'navbar' },
      React.createElement('div', null,
        React.createElement('h1', null, 'SK Machines'),
        React.createElement('div', { className:'navbar-conf' }, 'Confidential'),
        React.createElement('div', { className:'navbar-meta' },
          React.createElement(HeaderClock),
          React.createElement('div', { className:'welcome-flash' }, 'Welcome '+(user?.name || user?.email || 'Staff'))
        ),
        user?.role !== 'admin' && user?.remarks ? React.createElement('div', { className:'remark-flash' }, '⭐ '+(user.name||'Staff')+' — "'+user.remarks+'"') : null
      ),
      React.createElement('div', { className:'navbar-right' },
        React.createElement('button', { className:'notif-btn', onClick:openNotifs, title:'Notifications' },
          '🔔',
          unreadCount > 0 && React.createElement('span', { className:'notif-dot' })
        ),
        React.createElement('button', { className:'logout-btn', onClick:doLogout }, 'Logout')
      )
    ),
    activeTab === 'att' && React.createElement(AttPage, { user:user }),
    activeTab === 'leave' && React.createElement(LeavePage, { user:user }),
    activeTab === 'req' && React.createElement(RequestPage, { user:user }),
    activeTab === 'adv' && user?.role !== 'admin' && React.createElement(AdvancePage, { user:user }),
    activeTab === 'hist' && React.createElement(HistPage, { user:user }),
    activeTab === 'prof' && React.createElement(ProfPage, { user:user }),
    activeTab === 'report' && user?.role === 'admin' && React.createElement(ReportPage, { user:user }),
    activeTab === 'admin' && user?.role === 'admin' && React.createElement(AdminPage, { user:user }),
    React.createElement(NotifPanel, { open:notifOpen, onClose:function(){setNotifOpen(false);}, notifs:notifs }),
    React.createElement('div', { className:'tabbar' },
      tabs.map(function(t){
        return React.createElement('button', {
          key:t.id,
          className:'tab-item'+(activeTab===t.id?' active':''),
          onClick:function(){setActiveTab(t.id);}
        },
          React.createElement('div', { className:'t-icon' }, t.icon),
          React.createElement('div', { className:'t-label' }, t.label)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
